  /* current surge — loud electric power-up that flows through the vent + pipes (attention grabber).
     Routed direct to destination (bypassing the master limiter) so it punches through clearly. */
  function sfxCurrentFlow() {
    const ctx = ac(), t0 = ctx.currentTime;
    const out = ctx.createGain(); out.gain.value = 1.0; out.connect(ctx.destination);

    /* low-end impact whoomp for body */
    const lo = ctx.createOscillator(), lg = ctx.createGain();
    lo.type = 'sine';
    lo.frequency.setValueAtTime(95, t0);
    lo.frequency.exponentialRampToValueAtTime(190, t0 + 0.28);
    lg.gain.setValueAtTime(0.0001, t0);
    lg.gain.exponentialRampToValueAtTime(0.5, t0 + 0.05);
    lg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
    lo.connect(lg); lg.connect(out);
    lo.start(t0); lo.stop(t0 + 0.52);

    /* rising buzzy surge — loud and sustained */
    const o = ctx.createOscillator(), f = ctx.createBiquadFilter(), g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(900, t0 + 0.5);
    f.type = 'bandpass'; f.Q.value = 1.8;
    f.frequency.setValueAtTime(450, t0);
    f.frequency.exponentialRampToValueAtTime(2900, t0 + 0.5);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.42, t0 + 0.07);
    g.gain.setValueAtTime(0.42, t0 + 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.95);
    o.connect(f); f.connect(g); g.connect(out);
    o.start(t0); o.stop(t0 + 0.98);

    /* electric crackle bursts */
    [0, 0.13, 0.28, 0.44, 0.6].forEach(t => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.045, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.005));
      const s = ctx.createBufferSource(), bp = ctx.createBiquadFilter(), cg = ctx.createGain();
      s.buffer = buf; bp.type = 'highpass'; bp.frequency.value = 2400; cg.gain.value = 0.5;
      s.connect(bp); bp.connect(cg); cg.connect(out);
      s.start(t0 + t);
    });

    /* bright confirm shimmer at the end */
    const o2 = ctx.createOscillator(), g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(1250, t0 + 0.45);
    o2.frequency.exponentialRampToValueAtTime(1950, t0 + 0.78);
    g2.gain.setValueAtTime(0.0001, t0 + 0.45);
    g2.gain.exponentialRampToValueAtTime(0.22, t0 + 0.55);
    g2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9);
    o2.connect(g2); g2.connect(out);
    o2.start(t0 + 0.45); o2.stop(t0 + 0.9);
  }

  /* ── Scale canvas to fit any viewport (letterboxed, aspect-preserved) ── */
  function scaleCanvas() {
    const el = document.getElementById('canvas');
    if (!el) return;
    const vp = window.visualViewport;
    const vw = (vp && vp.width)  || window.innerWidth  || document.documentElement.clientWidth;
    const vh = (vp && vp.height) || window.innerHeight || document.documentElement.clientHeight;
    const s  = Math.min(vw / 1920, vh / 1080);
    /* centre the scaled canvas with an explicit translate (letterbox offsets) */
    const tx = Math.round((vw - 1920 * s) / 2);
    const ty = Math.round((vh - 1080 * s) / 2);
    el.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
  }
  let _scaleRAF = null;
  function requestScale() {
    if (_scaleRAF) cancelAnimationFrame(_scaleRAF);
    _scaleRAF = requestAnimationFrame(scaleCanvas);
  }
  window.addEventListener('resize', requestScale);
  window.addEventListener('orientationchange', requestScale);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', requestScale);
  scaleCanvas();
  /* a couple of follow-up passes catch mobile address-bar / late layout shifts */
  window.addEventListener('load', scaleCanvas);
  setTimeout(scaleCanvas, 300);

  /* ── Game config ───────────────────────────────── */
  /* Each level is a 7-slot skip-counting sequence. `prefilled` lists the slot indices
     shown from the start; the player fills the remaining slots (in order) by tapping the
     correct option. `options` are the 4 tiles shown below (one is a distractor). */
  const ROWS_CONFIG = [
    { seq: [16, 14, 12, 10, 8, 6, 4, 2],     prefilled: [0, 1, 2, 3, 4], options: [6, 4, 2, 5],    label: 'Level 1' },
    { seq: [15, 13, 11, 9, 7, 5, 3, 1],      prefilled: [0, 1, 2, 3, 4], options: [5, 3, 1, 6],    label: 'Level 2' },
    { seq: [40, 35, 30, 25, 20, 15, 10, 5],  prefilled: [0, 1, 2, 3, 4], options: [15, 10, 5, 8],  label: 'Level 3' },
    { seq: [80, 70, 60, 50, 40, 30, 20, 10], prefilled: [0, 1, 2, 3, 4], options: [30, 20, 10, 15], label: 'Level 4' },
  ];
  const TOTAL = 8;
  const SWITCH_OFFSET_MS = 3850;   /* wait for the box to open + the pipe & power to appear */
  const SWITCH_STEP_MS   = 340;    /* gap between each switch dropping in */

  function getUserPositions(cfg) {
    const pre = new Set(cfg.prefilled);
    const pos = [];
    for (let i = 0; i < cfg.seq.length; i++) if (!pre.has(i)) pos.push(i);
    return pos;
  }

  /* ── State ─────────────────────────────────────── */
  let phase       = 'intro';
  let currentRow  = 0;
  let grid        = [];
  let wrongCount  = 0;
  let wrongAnswer = null;
  let showHint    = false;
  let justPlaced  = false;
  let firstRender = false;
  let score       = 0;
  let streak      = 0;
  let timer       = null;
  let levelTimer  = null;

  function initGrid() {
    /* the player fills the non-prefilled slots in order, so each row starts empty */
    grid = ROWS_CONFIG.map(() => []);
  }

  function getCorrect(cfg, filledCount) {
    const pos = getUserPositions(cfg);
    return cfg.seq[pos[filledCount]];
  }

  /* ── Hint feature ──────────────────────────────────
     After 2 wrong taps the bulb button glows ("armed"). Tapping it reveals the pattern
     hint: "±N" hop arrows above the switches + the correct option glowing. The arrow art
     already has the (signed) step baked in — one asset per step we use:
       +2  → 'arrow arc.webp'      −2  → '- arrow arc.webp'
       −5  → 'arrow arc 2.webp'    −10 → '-arrow arc 2.webp'   */
  const SW_TILE = 128, SW_GAP = 23, SW_PITCH = SW_TILE + SW_GAP, PANEL_W = 1573.948;
  const HINT_ARROW_SRC = {
    '2':   'assets/arrow arc.webp',
    '-2':  'assets/- arrow arc.webp',
    '-5':  'assets/arrow arc 2.webp',
    '-10': 'assets/-arrow arc 2.webp',
  };
  let hintArmed = false;

  /* panel-relative x-centre of switch i, matching the centred flex row in CSS */
  function switchCenterX(i, count) {
    const rowW = count * SW_TILE + (count - 1) * SW_GAP;
    return (PANEL_W - rowW) / 2 + i * SW_PITCH + SW_TILE / 2;
  }

  function buildHintArrows(cfg) {
    const wrap = document.getElementById('hint-arrows');
    wrap.innerHTML = '';
    const count = cfg.seq.length;
    const step  = cfg.seq[1] - cfg.seq[0];
    const src   = HINT_ARROW_SRC[step] || HINT_ARROW_SRC['2'];
    const AW    = 120;   /* scaled to fit the band above the switches (~82px tall) */
    for (let i = 0; i < count - 1; i++) {          /* one arrow per gap between switches */
      const mid = switchCenterX(i, count) + SW_PITCH / 2;
      const a = document.createElement('div');
      a.className = 'hint-arrow';
      a.style.left  = (mid - AW / 2) + 'px';
      a.style.top   = '72px';   /* below the vent housing, arrowheads just above the switches */
      a.style.width = AW + 'px';
      const img = document.createElement('img');
      img.src = src; img.alt = (step > 0 ? '+' : '') + step;
      img.style.animationDelay = (i * 0.07) + 's';
      a.appendChild(img);
      wrap.appendChild(a);
    }
  }

  function armHint() {
    if (showHint) return;   /* already revealed for this slot */
    hintArmed = true;
    hideTutorialGuide();    /* only the hint bulb should pulse — stop the answer glow */
    const b = document.getElementById('hint-btn');
    if (b) { b.classList.add('armed'); b.classList.remove('used'); }
  }

  /* clear all hint state — called on new slot / level / reset.
     During the Level 1 tutorial the "−2" arrows stay pinned as a guide, so we keep them. */
  function resetHint() {
    hintArmed = false;
    const b = document.getElementById('hint-btn');
    if (b) b.classList.remove('armed', 'used');
    if (tutorialMode) return;
    const w = document.getElementById('hint-arrows');
    if (w) { w.classList.add('hidden'); w.innerHTML = ''; }
  }

  /* player tapped the glowing bulb → reveal the pattern hint */
  function revealHint() {
    if (!hintArmed) return;
    hintArmed = false;
    showHint = true;
    const b = document.getElementById('hint-btn');
    if (b) { b.classList.remove('armed'); b.classList.add('used'); }
    sfxPop(720);
    buildHintArrows(ROWS_CONFIG[currentRow]);
    document.getElementById('hint-arrows').classList.remove('hidden');
    renderQuestion();                 /* makes the correct option glow (showHint) */
    queueBotText('Follow the pattern!');
  }

  /* ── Screen switching ──────────────────────────── */
  function showScreen(name) {
    ['intro','level','question','complete'].forEach(s =>
      document.getElementById('screen-' + s).classList.toggle('hidden', s !== name)
    );
  }

  /* Blast-door transition: doors slide shut, swap the screen behind them, slide open */
  function playTransition(swap) {
    const t = document.getElementById('transition');
    t.classList.remove('hidden', 'closed');
    void t.offsetWidth;
    t.classList.add('closed');                       /* doors slide shut */
    sfxPowerDown();
    setTimeout(() => { if (swap) swap(); }, 700);    /* swap the screen while covered */
    setTimeout(() => {
      t.classList.remove('closed');                  /* doors slide open on the new screen */
      sfxPowerUp();
      setTimeout(() => t.classList.add('hidden'), 700);
    }, 1050);
  }

  /* ── DOM builder ───────────────────────────────── */
  function makeSw(num, stateClass, onClick) {
    const div = document.createElement('div');
    div.className = 'sw ' + stateClass;
    if (num != null) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const span = document.createElement('span');
      span.className = 'tile-num';
      span.textContent = String(num);
      tile.appendChild(span);
      div.appendChild(tile);
    }
    if (onClick) {
      /* hover sound — throttled so rapid mouse moves don't stack */
      let hoverCooldown = false;
      div.addEventListener('mouseenter', () => {
        if (hoverCooldown) return;
        sfxHover();
        hoverCooldown = true;
        setTimeout(() => { hoverCooldown = false; }, 80);
      });
      /* click sound fires immediately; game logic fires after */
      div.addEventListener('click', () => { sfxClick(); onClick(); });
    }
    return div;
  }

  /* ── Sparks: fling glowing particles from a wrong switch ── */
  function spawnSparks(el, count) {
    if (!el) return;
    count = count || 20;

    /* central burst flash for impact */
    const burst = document.createElement('div');
    burst.className = 'spark-burst';
    el.appendChild(burst);
    burst.animate([
      { transform: 'translate(-50%,-50%) scale(0.2)', opacity: 0.95 },
      { transform: 'translate(-50%,-50%) scale(1.9)', opacity: 0 }
    ], { duration: 380, easing: 'ease-out' }).onfinish = () => burst.remove();

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const size = 5 + Math.random() * 7;
      s.style.width = s.style.height = size + 'px';
      const hue = 18 + Math.random() * 38;            /* orange → yellow */
      s.style.background = `radial-gradient(circle, #fff 0%, hsl(${hue},100%,58%) 70%)`;
      el.appendChild(s);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 55 + Math.random() * 95;
      const dx    = Math.cos(angle) * dist;
      const up    = -Math.abs(Math.sin(angle) * dist) * 0.6 - (18 + Math.random() * 42);
      const fall  = 130 + Math.random() * 120;
      const dur   = 480 + Math.random() * 360;
      s.animate([
        { transform: 'translate(-50%,-50%) translate(0px,0px) scale(1)', opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${dx}px, ${up}px) scale(1)`, opacity: 1, offset: 0.35 },
        { transform: `translate(-50%,-50%) translate(${dx * 1.25}px, ${up + fall}px) scale(0.15)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.18,0.7,0.3,1)' }).onfinish = () => s.remove();
    }
  }

  /* ── Render question screen ────────────────────── */
  function renderQuestion() {
    const cfg     = ROWS_CONFIG[currentRow];
    const row     = grid[currentRow];
    const correct = getCorrect(cfg, row.length);

    const isRowComplete = phase === 'row-complete';

    /* ── Panel & chrome state ── */
    const panel  = document.getElementById('main-panel');
    const botBar = document.getElementById('bot-bar');
    if (isRowComplete) { panel.classList.remove('opening'); document.getElementById('screen-question').classList.remove('intro'); }
    panel.classList.toggle('row-complete', isRowComplete);
    if (!isRowComplete) panel.classList.remove('well-done-active');
    document.getElementById('screen-question').classList.toggle('celebrating', isRowComplete);

    /* Vent bars glow green on a correct placement; no red flash on a wrong tap */
    panel.classList.remove('vent-wrong');
    panel.classList.toggle('vent-correct', justPlaced);
    botBar.style.visibility = isRowComplete ? 'hidden' : 'visible';

    /* Well done overlay — reveal handled by the timer in handleAnswer */
    const wellDoneEl = document.getElementById('well-done-msg');
    if (!isRowComplete) {
      wellDoneEl.classList.add('hidden');
    }

    /* wrong feedback lives entirely on the tapped option tile — no overlay */
    document.getElementById('wrong-msg').classList.add('hidden');

    /* ── Switch row container ── */
    const swRow = document.getElementById('switch-row');
    swRow.innerHTML = '';
    swRow.classList.remove('shaking');   /* wrong feedback is on the option tile, not the row */

    const userPositions = getUserPositions(cfg);
    const rowFull       = row.length >= userPositions.length;

    /* ── Power button (top-right, separate from row) ── */
    const powerEl = document.getElementById('power-btn');
    powerEl.src = rowFull ? 'assets/Green button.webp' : 'assets/Red button.webp';
    powerEl.alt = rowFull ? 'ON' : 'OFF';
    powerEl.classList.toggle('pulsing', rowFull);   /* powers ON (green) when the row is full */
    /* current flows through the pipes the moment the pattern is completed */
    const patternDone = rowFull && !isRowComplete;
    document.getElementById('screen-question').classList.toggle('current-on', patternDone);
    /* main panel border turns green on a correct, completed pattern (Figma success screen) */
    document.getElementById('panel-frame').src = patternDone ? 'assets/figma/panel-green.webp' : 'assets/figma/panel.webp';

    /* ── switch slots (one per number in the level's sequence) ── */
    const stepMs    = SWITCH_STEP_MS;
    const offsetMs  = SWITCH_OFFSET_MS;
    const prefilled = new Set(cfg.prefilled);

    for (let i = 0; i < cfg.seq.length; i++) {
      const delayMs = offsetMs + i * stepMs;
      const delay   = firstRender ? `${delayMs / 1000}s` : '0s';

      if (isRowComplete) {
        swRow.appendChild(makeSw(cfg.seq[i], 'complete-fill'));
        continue;
      }

      /* ── Pre-filled slot (shown from the start) ── */
      if (prefilled.has(i)) {
        const el = makeSw(cfg.seq[i], 'filled');
        const tile = el.querySelector('.tile');
        if (tile && firstRender) { tile.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; tile.style.animationDelay = delay; }
        swRow.appendChild(el);
        if (firstRender) setTimeout(() => sfxSwitchAppear(i), delayMs);   /* switch-appear clack */
        continue;
      }

      /* ── User-fill slot ── */
      const userIdx   = userPositions.indexOf(i);
      const answered  = userIdx < row.length;
      const isCurrent = userIdx === row.length;
      /* a wrong tap never lands in the switch row — the current slot just stays empty */
      if (answered) {
        const isNew = justPlaced && userIdx === row.length - 1;
        const el = makeSw(row[userIdx], isNew ? 'new' : 'filled');
        if (isNew) el.style.animationDelay = delay;
        swRow.appendChild(el);
      } else {
        const div = document.createElement('div');
        div.className = 'sw empty' + (isCurrent ? ' next-slot' : '');
        if (firstRender) { div.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; div.style.animationDelay = delay; }
        swRow.appendChild(div);
      }
    }

    /* ── Options ── */
    const optArea = document.getElementById('options-area');
    optArea.innerHTML = '';
    if (isRowComplete) { optArea.classList.add('invisible'); return; }
    optArea.classList.remove('invisible', 'reveal', 'hidden-initially');
    cfg.options.forEach(opt => {
      const isCorrect      = opt === correct;
      const isWrongOption  = phase === 'wrong' && opt === wrongAnswer;
      const cls            = isWrongOption ? 'wrong-option'
                           : showHint && isCorrect ? 'hint'
                           : 'option';
      optArea.appendChild(makeSw(opt, cls, isWrongOption ? null : () => handleAnswer(opt)));
    });
  }

  /* ══════════════════════════════════════════════════
     LEVEL 1 TUTORIAL  (only the first level is a guided tutorial)
     ══════════════════════════════════════════════════ */
  let tutorialMode = false;

  /* read the shown numbers left→right: only pop each switch (and speak it) — the bot bar
     keeps the "Let us read the pattern together." line, no numbers shown. */
  function tutorialReadNumbers(indices, done) {
    const cfg = ROWS_CONFIG[currentRow];
    const sws = document.querySelectorAll('#switch-row .sw');
    let k = 0;
    const readNext = () => {
      if (k >= indices.length) { setTimeout(() => { if (done) done(); }, 500); return; }
      const el = sws[indices[k]];
      if (el) { el.classList.remove('read-pop'); void el.offsetWidth; el.classList.add('read-pop'); }
      playNumberVoice(cfg.seq[indices[k]]);
      sfxPop(540 + k * 28);
      k++;
      setTimeout(readNext, 800);
    };
    readNext();
  }

  /* build one "−N" hop arrow over the gap after switch i (between switch i and i+1) */
  function makeHopArrow(cfg, i) {
    const count = cfg.seq.length;
    const step  = cfg.seq[1] - cfg.seq[0];
    const src   = HINT_ARROW_SRC[step] || HINT_ARROW_SRC['2'];
    const AW    = 120;
    const mid   = switchCenterX(i, count) + SW_PITCH / 2;
    const a = document.createElement('div');
    a.className = 'hint-arrow';
    a.style.left  = (mid - AW / 2) + 'px';
    a.style.top   = '72px';
    a.style.width = AW + 'px';
    const img = document.createElement('img');
    img.src = src; img.alt = (step > 0 ? '+' : '') + step;
    a.appendChild(img);
    return a;
  }

  /* reveal "−2" arrows over the given gaps, one by one, then call done() */
  function tutorialShowArrows(gaps, done) {
    const wrap = document.getElementById('hint-arrows');
    wrap.classList.remove('hidden');
    const cfg = ROWS_CONFIG[currentRow];
    let k = 0;
    const showNext = () => {
      if (k >= gaps.length) { if (done) done(); return; }
      wrap.appendChild(makeHopArrow(cfg, gaps[k]));
      sfxPop(620 + k * 25);
      k++;
      setTimeout(showNext, 620);
    };
    showNext();
  }

  function glowAllArrows() {
    document.querySelectorAll('#hint-arrows .hint-arrow').forEach(a => a.classList.add('glow'));
  }

  /* the −2 arrows over the empty answer slots; revealed one at a time as the player
     places each correct switch, so the arrow "proceeds" with the pattern. */
  let tutorialAnswerGaps = [];
  function tutorialAdvanceArrow(n) {
    if (!tutorialMode || n < 0 || n >= tutorialAnswerGaps.length) return;
    const wrap = document.getElementById('hint-arrows');
    if (!wrap || wrap.querySelector('[data-gap="' + tutorialAnswerGaps[n] + '"]')) return;
    const a = makeHopArrow(ROWS_CONFIG[currentRow], tutorialAnswerGaps[n]);
    a.dataset.gap = tutorialAnswerGaps[n];
    wrap.appendChild(a);                       /* pops in via hintArrowIn */
    sfxPop(660);
    setTimeout(() => a.classList.add('glow'), 450);   /* then joins the glow */
  }

  /* tutorial guide — glow the correct option AND point an arrow at the current blank slot.
     Re-applied after every render since renderQuestion rebuilds the switch + option rows. */
  function hideTutorialGuide() {
    document.querySelectorAll('#options-area .sw.tut-guide').forEach(el => el.classList.remove('tut-guide'));
    document.querySelectorAll('#switch-row .blank-arrow').forEach(el => el.remove());
  }
  function showTutorialGuide() {
    hideTutorialGuide();
    /* if the hint bulb is pulsing, it gets exclusive attention — no answer glow / arrow */
    if (!tutorialMode || phase !== 'question' || hintArmed) return;
    const cfg = ROWS_CONFIG[currentRow];
    const correct = getCorrect(cfg, grid[currentRow].length);
    const opts = document.querySelectorAll('#options-area .sw');
    cfg.options.forEach((opt, i) => { if (opt === correct && opts[i]) opts[i].classList.add('tut-guide'); });
    /* arrow over the current blank slot to show where the answer goes */
    const blank = document.querySelector('#switch-row .sw.empty.next-slot')
               || document.querySelector('#switch-row .sw.empty');
    if (blank) blank.appendChild(Object.assign(document.createElement('div'), { className: 'blank-arrow' }));
  }

  /* the full Level 1 tutorial script, chained through the voice queue */
  function runLevel1Tutorial() {
    tutorialMode = true;
    const cfg   = ROWS_CONFIG[0];
    const shown = cfg.prefilled.slice().sort((a, b) => a - b);   /* [0,1,2,3,4] */
    const shownGaps  = shown.slice(0, -1);                       /* [0,1,2,3] — between shown numbers */
    const answerGaps = [];                                        /* [4,5,6] — into the empty answer slots */
    for (let i = shown[shown.length - 1]; i < cfg.seq.length - 1; i++) answerGaps.push(i);

    const wrap = document.getElementById('hint-arrows');
    wrap.classList.remove('hidden'); wrap.innerHTML = '';

    queueBotText('Let us start fixing the switches.');
    queueBotText('These switches are in a pattern.');
    queueBotText('Let us read the pattern together.');
    /* read: "16, 14, 12, 10, 8" — popping each shown switch */
    queueAction(finish => tutorialReadNumbers(shown, finish));
    /* "We are subtracting 2 at each step." — show −2 arrows over the shown gaps one by one */
    queueAction(finish => {
      _typeBotText('We are subtracting 2 at each step.');
      tutorialShowArrows(shownGaps, () => setTimeout(finish, 700));
    });
    /* "We keep subtracting the same number!" — glow all the arrows together */
    queueAction(finish => {
      _typeBotText('We keep subtracting the same number!');
      glowAllArrows();
      setTimeout(finish, 2200);
    });
    /* "Tap the correct switch to continue the pattern." — reveal ONLY the arrow into the
       first empty slot; the rest proceed as the player places each correct switch. */
    queueAction(finish => {
      _typeBotText('Tap the correct switch to continue the pattern.');
      glowAllArrows();                 /* the shown-number arrows all glow */
      tutorialAnswerGaps = answerGaps; /* answer arrows reveal one-per-correct-tap, none up front */
      setTimeout(() => { finish(); showTutorialGuide(); }, 800);   /* glow the correct option */
    });
  }

  /* ── Game flow ─────────────────────────────────── */
  function buildLevelScreen(cfg) {
    document.getElementById('level-name').textContent = cfg.label.toUpperCase();
    const tiles = document.getElementById('level-pattern-tiles');
    tiles.innerHTML = '';
    cfg.seq.forEach(num => {
      const t = document.createElement('div');
      t.className = 'level-tile';
      t.textContent = num;
      tiles.appendChild(t);
    });
    const dots = document.createElement('div');
    dots.className = 'level-tile-dots';
    dots.textContent = '···';
    tiles.appendChild(dots);

    if (levelTimer) clearTimeout(levelTimer);
    levelTimer = setTimeout(handleLevelStart, 2500);
  }

  let _started = false;
  function handleStart() {
    if (_started) return;          /* ignore rapid double-taps */
    _started = true;
    /* unlock the Web Audio context on this user gesture so timed SFX can play later */
    try { const c = ac(); if (c.state === 'suspended') c.resume(); } catch (e) {}
    sfxClick();   /* audible PLAY press (context is now unlocked by this gesture) */
    /* a little spark burst flies off the visible Play / Play Again button, then doors close */
    const btn = document.querySelector('#screen-intro .btn-play:not(.hidden)')
             || document.querySelector('#screen-intro .btn-play');
    spawnSparks(btn, 16);
    sfxPop(760);
    setTimeout(() => { playTransition(() => { handleLevelStart(); }); }, 400);
  }

  function handleLevelStart() {
    phase = 'question';
    showScreen('question');

    /* playful one-by-one entrance: robot → bar → power → pipes → box → switches */
    const sq = document.getElementById('screen-question');
    sq.classList.remove('intro');
    void sq.offsetWidth;
    sq.classList.add('intro');
    setTimeout(() => sq.classList.remove('intro'), 3950);

    /* one-by-one blips: robot, then (after the box) the blue pipe + red power together */
    setTimeout(() => sfxPop(620), 150);   /* robot       */
    setTimeout(() => sfxPop(660), 2950);  /* blue pipe   */
    setTimeout(() => sfxPop(780), 2990);  /* red power   */

    /* reset the top-left character (Byte dances on a completed level) */
    document.getElementById('byte-dance').classList.remove('show');
    document.getElementById('qrobot').style.opacity = '';
    resetHint();   /* bulb dim, no hop arrows at the start of the level */
    document.getElementById('hint-btn').classList.add('await-bar');   /* bulb waits for the bot bar */

    /* the bot bar stays hidden until everything else has appeared */
    const botBar = document.getElementById('bot-bar');
    botBar.classList.remove('bar-reveal');
    botBar.classList.add('bar-hidden');

    firstRender = true; renderQuestion(); firstRender = false;

    /* robot + bar first, THEN the main box opens, THEN its blue pipe + red power button */
    const panelEl = document.getElementById('main-panel');
    panelEl.classList.remove('opening');
    void panelEl.offsetWidth;
    panelEl.classList.add('opening');
    setTimeout(sfxPanelOpen, 1000);

    /* keep the whole options box + its link pipes tucked away until every
       switch has appeared — then deploy them out of the main panel */
    const optArea = document.getElementById('options-area');
    const optBox  = document.getElementById('options-box');
    const pipes   = document.querySelectorAll('.opt-pipe');
    optBox.classList.remove('deploy', 'retract');  optBox.classList.add('hidden-initially');
    optArea.classList.remove('reveal'); optArea.classList.add('hidden-initially');
    pipes.forEach(p => { p.classList.remove('extend', 'retract'); p.classList.add('hidden-initially'); });

    const unlockDelay = SWITCH_OFFSET_MS + (TOTAL - 1) * SWITCH_STEP_MS + 700;
    setTimeout(() => {
      /* 1 — pipes shoot down out of the panel */
      pipes.forEach(p => {
        p.classList.remove('hidden-initially');
        void p.offsetWidth;
        p.classList.add('extend');
      });
      /* 2 — the (empty) option box deploys out of the panel, with the whoosh */
      setTimeout(() => {
        sfxDeploy();
        optBox.classList.remove('hidden-initially');
        void optBox.offsetWidth;
        optBox.classList.add('deploy');
      }, 560);
      /* 3 — once the box is in place, the option switches pop in one by one */
      setTimeout(() => {
        optArea.classList.remove('hidden-initially');
        void optArea.offsetWidth;
        optArea.classList.add('reveal');
        _setOptionsLock(true);   /* lock immediately so no tap lands before the intro speaks */
        sfxPop(700);   /* single pop — all four options appear together */
        setTimeout(() => optArea.classList.remove('reveal'), 1400);

        /* 4 — finally the text box slides in, THEN the bot speaks */
        setTimeout(() => {
          /* clear any leftover text + keep options locked so the bar reveals blank
             (no stale "Tap the correct switch." flash before the intro types) */
          document.getElementById('bot-text').textContent = '';
          _setOptionsLock(true);
          botBar.classList.remove('bar-hidden');
          void botBar.offsetWidth;
          botBar.classList.add('bar-reveal');
          document.getElementById('hint-btn').classList.remove('await-bar');   /* bulb fades in with the bar */
          sfxBarOpen();
          setTimeout(() => {
            /* Level 1 is a guided tutorial (only the first level) */
            runLevel1Tutorial();
          }, 450);
        }, 750);
      }, 560 + 1400);   /* after the box-deploy animation (1.4s) finishes */
    }, unlockDelay);
  }

  /* Levels after the tutorial: the chrome stays on screen — only the new switches
     refresh and the option placeholder animates back in (no level screen, no re-entrance). */
  function loadLevelInPlace() {
    if (timer) clearTimeout(timer);
    phase = 'question';

    /* drop the previous level's spoken line and show the fresh instruction right away
       (levels 2+ are normal gameplay — no tutorial reading). */
    clearVoiceQueue();
    stopConfetti();
    tutorialMode = false;   /* only Level 1 is the tutorial */
    hideTutorialGuide();
    document.getElementById('bot-text').textContent = 'Tap the correct switch.';

    /* clear the previous level's completion state — everything else stays put */
    const sq = document.getElementById('screen-question');
    sq.classList.remove('current-on', 'celebrating', 'intro');
    const panel = document.getElementById('main-panel');
    panel.classList.remove('row-complete', 'well-done-active', 'opening');
    document.getElementById('panel-frame').src = 'assets/figma/panel.webp';
    document.getElementById('well-done-msg').classList.add('hidden');
    document.getElementById('byte-dance').classList.remove('show');
    document.getElementById('qrobot').style.opacity = '';
    resetHint();   /* clear any bulb glow / hop arrows from the previous level */
    const botBar = document.getElementById('bot-bar');
    botBar.classList.remove('bar-hidden');     /* the text bar stays */
    botBar.style.visibility = 'visible';

    /* the new level's switches just appear (chrome already in place — no cascade) */
    firstRender = false; renderQuestion();

    /* hide the option box + pipes, then deploy ONLY them with animation */
    const optArea = document.getElementById('options-area');
    const optBox  = document.getElementById('options-box');
    const pipes   = document.querySelectorAll('.opt-pipe');
    optBox.classList.remove('deploy', 'retract'); optBox.classList.add('hidden-initially');
    optArea.classList.remove('reveal'); optArea.classList.add('hidden-initially');
    pipes.forEach(p => { p.classList.remove('extend', 'retract'); p.classList.add('hidden-initially'); });

    setTimeout(() => {
      pipes.forEach(p => { p.classList.remove('hidden-initially'); void p.offsetWidth; p.classList.add('extend'); });
      setTimeout(() => {
        sfxDeploy();
        optBox.classList.remove('hidden-initially'); void optBox.offsetWidth; optBox.classList.add('deploy');
      }, 560);
      setTimeout(() => {
        optArea.classList.remove('hidden-initially'); void optArea.offsetWidth; optArea.classList.add('reveal');
        sfxPop(700);
        setTimeout(() => optArea.classList.remove('reveal'), 1400);
      }, 560 + 1400);
    }, 1150);   /* wait for the blast doors to open before deploying the options */
  }

  function handleAnswer(val) {
    if (phase !== 'question' && phase !== 'hint') return;
    if (timer) clearTimeout(timer);

    const cfg     = ROWS_CONFIG[currentRow];
    const correct = getCorrect(cfg, grid[currentRow].length);

    if (val === correct) {
      playSwitchSound();      /* switch-flip sound (assets/switch.ogg) as the correct tile locks in */
      playNumberVoice(val);   /* speak the number if a voice clip exists for it */
      const pts   = showHint ? 5 : wrongCount === 0 ? 15 : 10;
      wrongCount  = 0; wrongAnswer = null; showHint = false;
      resetHint();   /* clear bulb glow + hop arrows now that this slot is solved */
      streak++; score += pts;
      grid[currentRow] = [...grid[currentRow], val];

      if (grid[currentRow].length >= getUserPositions(cfg).length) {
        _setOptionsLock(true);
        /* reveal the final −2 arrow for the last correct tap; leave every arrow shown over the
           completed pattern (they clear when the next level loads). */
        if (tutorialMode) tutorialAdvanceArrow(grid[currentRow].length - 1);
        tutorialMode = false;
        hideTutorialGuide();
        sfxCorrect();
        phase = 'question';
        justPlaced = true; renderQuestion(); justPlaced = false;
        sfxRowComplete();
        setTimeout(sfxCurrentFlow, 230);   /* electric surge as the current flows (after the correct chime) */
        fireConfetti();                    /* themed energy-burst confetti to celebrate the fixed pattern */

        /* the option placeholder retracts back up into the panel */
        const _ob = document.getElementById('options-box');
        _ob.classList.remove('deploy'); void _ob.offsetWidth; _ob.classList.add('retract');
        document.querySelectorAll('.opt-pipe').forEach(p => { p.classList.remove('extend'); p.classList.add('retract'); });

        /* Byte dances in the top-left to celebrate */
        document.getElementById('qrobot').style.opacity = '0';
        document.getElementById('byte-dance').classList.add('show');

        const isLast = currentRow + 1 >= ROWS_CONFIG.length;
        const advance = () => {
          timer = setTimeout(() => {
            if (isLast) {
              /* GAME complete — happy fanfare + a fresh confetti burst as the end screen appears */
              playTransition(() => { showScreen('complete'); sfxWin(); fireConfetti(); playEndVideo(); });
            } else {
              /* blast-door transition, then the next level loads in place (only options animate) */
              playTransition(() => { currentRow++; loadLevelInPlace(); });
            }
          }, 700);
        };

        const winLines = [
          'Good job! You fixed these switches.',
          'Wuhoo! The switches are fixed.',
          'Well done! All the switches are fixed.'
        ];
        queueBotText(winLines[Math.floor(Math.random() * winLines.length)], null, advance);
      } else {
        sfxCorrect();
        phase = 'question';
        justPlaced = true; renderQuestion(); justPlaced = false;
        /* tutorial: reveal the −2 arrow for the slot just filled, then move the hand on */
        if (tutorialMode) { tutorialAdvanceArrow(grid[currentRow].length - 1); showTutorialGuide(); }
      }
    } else {
      /* Incorrect: feedback lives only on the tapped OPTION tile — sparks + shake + yellow
         glow + a wrong SFX. No switch-row placement, no vent flash, and NO voice line
         (so the instruction never replays and the player can retry as soon as the shake ends). */
      sfxWrong();
      wrongAnswer = val; streak = 0; wrongCount++;
      phase = 'wrong';
      hideTutorialGuide();           /* clear the guide glow during the wrong-shake */
      renderQuestion();
      spawnSparks(document.querySelector('#options-area .sw.wrong-option .tile'));
      timer = setTimeout(() => {
        wrongAnswer = null; phase = 'question';
        if (wrongCount >= 2 && !showHint) armHint();   /* arm the hint bulb silently after 2 wrong */
        renderQuestion();
        if (tutorialMode) showTutorialGuide();         /* restore the guide glow for the retry */
      }, 800);
    }
  }

  /* ── Confetti: a themed burst of glowing energy shards, sparks & bolts ── */
  let _confettiRAF = null;
  let _confettiLast = 0;
  const CONFETTI_COLORS = ['#0ce4f9', '#7ff6ff', '#c9f9fe', '#5dff9b', '#23e070', '#ffffff'];

  function _rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  /* a little filled lightning bolt centred on (0,0), height ~s */
  function _bolt(ctx, s) {
    const p = [[0.18, -0.5], [-0.28, 0.08], [-0.02, 0.08], [-0.18, 0.5], [0.30, -0.10], [0.04, -0.10]];
    ctx.beginPath();
    ctx.moveTo(p[0][0] * s, p[0][1] * s);
    for (let i = 1; i < p.length; i++) ctx.lineTo(p[i][0] * s, p[i][1] * s);
    ctx.closePath();
    ctx.fill();
  }

  function fireConfetti() {
    const canvas = document.getElementById('fx-confetti');
    if (!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext('2d');
    const W = 1920, H = 1080;
    if (canvas.width !== W) { canvas.width = W; canvas.height = H; }
    const parts = [];
    const rand = (a, b) => a + Math.random() * (b - a);
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];

    function emit(x, y, n, angle, spread, sMin, sMax) {
      for (let i = 0; i < n; i++) {
        const ang = angle + rand(-spread / 2, spread / 2);
        const sp = rand(sMin, sMax);
        const r = Math.random();
        const shape = r < 0.18 ? 'bolt' : r < 0.40 ? 'spark' : 'shard';
        parts.push({
          x, y,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          g: rand(0.30, 0.46),
          drag: rand(0.984, 0.992),
          col: pick(CONFETTI_COLORS),
          shape,
          len: shape === 'shard' ? rand(16, 32) : shape === 'bolt' ? rand(20, 34) : rand(3, 6),
          w: rand(5, 9),
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.34, 0.34),
          life: 0, max: rand(95, 150),
          flutter: rand(0.03, 0.07),
          phase: rand(0, Math.PI * 2),
        });
      }
    }

    /* burst out of the power button (the energy that just switched on) … */
    emit(1786, 121, 70, Math.PI / 2, Math.PI * 1.7, 9, 22);
    /* … plus two side cannons firing up & inward for a celebratory fill */
    emit(150, 1080, 80, -Math.PI / 2 + 0.42, 0.7, 27, 41);
    emit(1770, 1080, 80, -Math.PI / 2 - 0.42, 0.7, 27, 41);
    /* a softer secondary pop from the panel a moment later */
    setTimeout(() => { if (_confettiRAF) emit(859, 360, 50, -Math.PI / 2, Math.PI * 1.2, 12, 26); }, 260);

    function draw(p, alpha) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.shadowColor = p.col;
      ctx.shadowBlur = 14;
      ctx.fillStyle = p.col;
      if (p.shape === 'shard') {
        _rrect(ctx, -p.w / 2, -p.len / 2, p.w, p.len, p.w / 2);
        ctx.fill();
      } else if (p.shape === 'spark') {
        ctx.beginPath();
        ctx.arc(0, 0, p.len, 0, Math.PI * 2);
        ctx.fill();
      } else {
        _bolt(ctx, p.len);
      }
      ctx.restore();
    }

    if (_confettiRAF) cancelAnimationFrame(_confettiRAF);
    _confettiLast = 0;
    function frame(now) {
      const dt = _confettiLast ? Math.min(2.2, (now - _confettiLast) / 16.67) : 1;
      _confettiLast = now;
      ctx.clearRect(0, 0, W, H);
      let alive = 0;
      for (const p of parts) {
        if (p.life >= p.max) continue;
        alive++;
        p.life += dt;
        p.vy += p.g * dt;
        const d = Math.pow(p.drag, dt);
        p.vx *= d; p.vy *= d;
        p.x += (p.vx + Math.sin(p.phase + p.life * p.flutter) * 1.3) * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
        const t = p.life / p.max;
        const alpha = t < 0.72 ? 1 : 1 - (t - 0.72) / 0.28;
        draw(p, alpha);
      }
      if (alive > 0) {
        _confettiRAF = requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0, 0, W, H);
        _confettiRAF = null;
      }
    }
    _confettiRAF = requestAnimationFrame(frame);
  }

  function stopConfetti() {
    if (_confettiRAF) { cancelAnimationFrame(_confettiRAF); _confettiRAF = null; }
    const canvas = document.getElementById('fx-confetti');
    if (canvas && canvas.getContext) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  /* final screen: play the end video; when it finishes, go back to the title screen */
  function playEndVideo() {
    const v = document.getElementById('end-video');
    if (!v) return;
    try { v.currentTime = 0; } catch (e) {}
    v.onended = () => playTransition(returnToTitle);
    const p = v.play();
    if (p && p.catch) p.catch(() => playTransition(returnToTitle));  /* autoplay blocked → still return */
  }

  /* after the ending video, reset everything and show the title with the Play Again button */
  function returnToTitle() {
    if (timer) clearTimeout(timer);
    if (levelTimer) clearTimeout(levelTimer);
    clearVoiceQueue();
    stopConfetti();
    const ev = document.getElementById('end-video');
    if (ev) { try { ev.pause(); ev.currentTime = 0; } catch (e) {} }
    phase = 'intro'; currentRow = 0;
    wrongCount = 0; wrongAnswer = null;
    showHint = false; score = 0; streak = 0;
    _started = false; tutorialMode = false;
    resetHint(); hideTutorialGuide(); initGrid();
    showScreen('intro');
    /* on the title after a win, swap Play → Play Again */
    document.getElementById('btn-play').classList.add('hidden');
    document.getElementById('btn-play-again').classList.remove('hidden');
  }

  /* ── Boot: preload every asset behind the loading screen, then start ── */
  const PRELOAD_ASSETS = [
    'assets/title screen.webp',
    'assets/play button.webp',
    'assets/play again.webp',
    'assets/robot dance.webp',
    'assets/Red button.webp',
    'assets/Green button.webp',
    'assets/background.webp',
    'assets/figma/robot.webp',
    'assets/figma/textbox.webp',
    'assets/figma/panel.webp',
    'assets/figma/panel-green.webp',
    'assets/figma/options-box.webp',
    'assets/figma/connector.webp',
    'assets/figma/tile.webp',
    'assets/arrow arc.webp',       /* hint hop: +2  */
    'assets/- arrow arc.webp',     /* hint hop: −2  */
    'assets/arrow arc 2.webp',     /* hint hop: −5  */
    'assets/-arrow arc 2.webp',    /* hint hop: −10 */
    'assets/hint.webp',            /* hint (bulb) button */
  ];

  function preloadAssets(onProgress) {
    let loaded = 0;
    const total = PRELOAD_ASSETS.length || 1;
    return Promise.all(PRELOAD_ASSETS.map(src => new Promise(resolve => {
      const img = new Image();
      img.onload = img.onerror = () => { loaded++; if (onProgress) onProgress(loaded / total); resolve(); };
      img.src = src;
    })));
  }

  let _booted = false;
  /* Smooth GSAP attention effects for the title-screen PLAY button */
  function animatePlayButton() {
    if (!window.gsap) return;
    const DEPTH = 'drop-shadow(0 7px 14px rgba(0,16,32,0.55))';
    const PERIOD = 1.25;   /* faster, livelier pulse (breathing + glow share one rhythm) */
    /* animate every play button (Play + Play Again) so both pulse and react to press */
    document.querySelectorAll('.btn-play').forEach(btn => {
      if (btn._gsapInit) return;
      btn._gsapInit = true;
      const img = btn.querySelector('img');
      if (!img) return;
      const breath = btn.querySelector('.pb-inner') || img;   /* Play: octagon+label together */

      /* stronger breathing — a clearly noticeable pulse */
      gsap.to(breath, {
        scale: 1.1, duration: PERIOD, repeat: -1, yoyo: true,
        ease: 'sine.inOut', transformOrigin: '50% 50%'
      });

      /* shaped neon glow that hugs the button (drop-shadow on the art), pulsing in sync */
      const g = { blur: 16, a: 0.5 };
      const paint = () => {
        img.style.filter = 'drop-shadow(0 0 ' + g.blur.toFixed(1) + 'px rgba(12,228,249,' +
                           g.a.toFixed(3) + ')) ' + DEPTH;
      };
      paint();
      gsap.to(g, {
        blur: 46, a: 1, duration: PERIOD, repeat: -1, yoyo: true,
        ease: 'sine.inOut', onUpdate: paint
      });

      /* smooth hover / press — all eased through GSAP */
      const to = (s, d, ease) => gsap.to(btn, { scale: s, duration: d, ease: ease, overwrite: 'auto' });
      btn.addEventListener('mouseenter',  () => to(1.07, 0.35, 'power3.out'));
      btn.addEventListener('mouseleave',  () => to(1.00, 0.55, 'power3.out'));
      btn.addEventListener('mousedown',   () => to(0.94, 0.12, 'power2.out'));
      btn.addEventListener('mouseup',     () => to(1.07, 0.30, 'power2.out'));
      btn.addEventListener('touchstart',  () => to(0.94, 0.12, 'power2.out'), { passive: true });
      btn.addEventListener('touchend',    () => to(1.00, 0.40, 'power2.out'));
    });
  }

  /* wire hover + press sounds onto the menu buttons (the switch/option tiles already have them) */
  function wireMenuSfx() {
    const addHover = (el) => {
      if (!el || el._hoverSfx) return;
      el._hoverSfx = true;
      let cd = false;
      el.addEventListener('mouseenter', () => {
        if (cd) return; sfxHover(); cd = true; setTimeout(() => { cd = false; }, 80);
      });
    };
    /* PLAY / PLAY AGAIN: press sound is played in handleStart() */
    document.querySelectorAll('.btn-play').forEach(addHover);
    const hint  = document.getElementById('hint-btn');
    if (hint && !hint._wired) {
      hint._wired = true;
      addHover(hint);
      hint.addEventListener('click', () => { sfxClick(); revealHint(); });
    }
  }

  function startGame() {
    if (_booted) return;
    _booted = true;
    const loader = document.getElementById('loader');
    if (loader) loader.classList.add('hidden');
    initGrid();
    showScreen('intro');
    animatePlayButton();
    wireMenuSfx();
  }

  initGrid();   /* set up game state immediately (cheap) */
  const _fill = document.getElementById('loader-fill');
  const _fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  Promise.race([
    Promise.all([
      preloadAssets(p => { if (_fill) _fill.style.width = Math.round(p * 100) + '%'; }),
      _fontsReady,
    ]),
    new Promise(resolve => setTimeout(resolve, 12000)),   /* safety: never hang past 12s */
  ]).then(startGame);
</script>
</body>
</html>
